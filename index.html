<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DepEd NCR — Training of Regional Trainers M&E Portal 2026</title>
<style>
/* ===== SCREEN STYLES ===== */
:root{
  --primary:#1a3a5c;--accent:#e8a020;--success:#2e7d32;
  --danger:#c62828;--warn:#f57f17;--bg:#f0f4f8;
  --card:#fff;--border:#d0d7de;--text:#1c2a3a;
  --muted:#6b7a8d;--sw:250px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#1a3a5c 0%,#0d2137 55%,#1a4a2c 100%)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:17px;color:var(--primary);font-weight:800;line-height:1.45}
.login-logo .prog{font-size:13px;font-weight:700;color:var(--primary);margin-top:6px}
.login-logo .sub{font-size:12px;color:var(--muted);margin-top:2px}
.login-logo .badge-prog{display:inline-block;background:#e8f5e9;color:#2e7d32;
  padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
.login-box label{display:block;font-size:13px;font-weight:600;color:var(--text);
  margin-bottom:5px;margin-top:14px}
.login-box input{width:100%;padding:10px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-size:14px;transition:.2s}
.login-box input:focus{border-color:var(--primary);outline:none}
.btn-login{width:100%;margin-top:22px;padding:12px;background:var(--primary);
  color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;
  cursor:pointer;transition:.2s}
.btn-login:hover{background:#254d78}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
#loginError{font-size:13px;margin-top:10px;text-align:center;display:none;
  line-height:1.6;color:var(--danger)}

/* APP */
#app{display:none;min-height:100vh;overflow:visible;flex-direction:row}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--primary);color:#fff;
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.15)}
.sb-header h2{font-size:10px;font-weight:700;letter-spacing:.5px;opacity:.6;text-transform:uppercase}
.sb-header p{font-size:13px;font-weight:700;margin-top:2px;line-height:1.3}
.sb-user{padding:10px 16px;background:rgba(0,0,0,.2);font-size:12px;
  border-bottom:1px solid rgba(255,255,255,.1)}
.sb-name{display:block;font-weight:700;font-size:13px;margin-top:2px}
.sb-role{display:block;font-size:11px;opacity:.75;margin-top:1px}
.nav-sec{padding:8px 16px 3px;font-size:10px;font-weight:700;opacity:.5;
  text-transform:uppercase;letter-spacing:.8px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 16px;
  cursor:pointer;font-size:13px;font-weight:500;transition:.15s;
  border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.1);border-left-color:rgba(255,255,255,.3)}
.nav-item.active{background:rgba(255,255,255,.15);border-left-color:var(--accent);font-weight:700}
.logout-btn{margin-top:auto;padding:13px 16px;background:rgba(255,0,0,.15);
  cursor:pointer;font-size:13px;font-weight:600;border-top:1px solid rgba(255,255,255,.1);transition:.15s}
.logout-btn:hover{background:rgba(255,0,0,.3)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px}
.page-title{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:18px}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kpi-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.kpi-val{font-size:28px;font-weight:800;color:var(--primary);margin:4px 0}
.kpi-sub{font-size:11px;color:var(--muted)}
.card{background:var(--card);border-radius:10px;padding:18px;border:1px solid var(--border);margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h3{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px}
.card h4{font-size:13px;font-weight:700;color:var(--primary);margin:12px 0 8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-size:12px}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
tr:hover td{background:#f5f8fc}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b-met{background:#e8f5e9;color:#2e7d32}
.b-partial{background:#fff8e1;color:#f57f17}
.b-low{background:#ffebee;color:#c62828}
.b-none{background:#f5f5f5;color:#999}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1.5px solid var(--border);
  border-radius:7px;font-size:13px;transition:.2s;font-family:inherit;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary);outline:none}
.fg input:disabled,.fg textarea:disabled{background:#f5f5f5;color:#888;cursor:not-allowed}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{padding:9px 18px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#254d78}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#1b5e20}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-pdf{background:#6a1b9a;color:#fff}.btn-pdf:hover{background:#4a148c}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;align-items:center}
.msg{padding:10px 14px;border-radius:7px;font-size:13px;font-weight:600;margin:8px 0;display:none}
.msg-success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.msg-error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.msg-info{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.show{display:block!important}

/* SECTION TABS */
.stabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.stab{padding:6px 11px;border-radius:16px;border:2px solid var(--primary);
  background:#fff;color:var(--primary);font-size:11px;font-weight:700;cursor:pointer;transition:.2s}
.stab.active{background:var(--primary);color:#fff}
.stab:hover:not(.active){background:#e8f0f8}

/* RUBRIC */
.rubric-box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.rubric-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px}
.rubric-desc{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.7;border-top:1px dashed var(--border);padding-top:8px}
.abcd-group{display:flex;flex-wrap:wrap;gap:6px}
.abcd-opt{display:flex;align-items:center;gap:5px;padding:7px 14px;border:2px solid var(--border);
  border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;transition:.2s;background:#fff;
  user-select:none}
.abcd-opt:hover{border-color:var(--primary)}
.abcd-opt.sel{border-color:var(--primary);background:var(--primary);color:#fff}
.abcd-opt input{display:none}

/* CHECKLIST */
.chk-item{padding:7px 0;border-bottom:1px solid #f0f4f8;display:flex;align-items:flex-start;gap:8px}
.chk-item:last-child{border-bottom:none}
.chk-item input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--primary);width:15px;height:15px;cursor:pointer}
.chk-item label{font-size:12.5px;line-height:1.5;cursor:pointer}
.chk-count{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-left:8px}

/* INCIDENT */
.inc-card{border:1.5px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;background:#fafcff}
.inc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

/* SUMMARY / OVERALL RATING */
.overall-box{text-align:center;padding:16px 0 20px}
.overall-num{font-size:52px;font-weight:900;padding:10px 30px;border-radius:14px;display:inline-block}
.r-exceed{background:#e8f5e9;color:#1b5e20}
.r-met{background:#e3f2fd;color:#0d47a1}
.r-partial{background:#fff8e1;color:#e65100}
.r-low{background:#ffebee;color:#b71c1c}
.r-none{background:#f5f5f5;color:#777}

/* CONSOLIDATED TABLE */
.cons-table th,.cons-table td{font-size:11px;padding:6px 8px}
.cons-table th{font-size:11px}

/* PRINT BUTTON HIGHLIGHT */
.btn-pdf{box-shadow:0 2px 8px rgba(106,27,154,.3)}

/* ===== PRINT STYLES ===== */

/* ===== MOBILE RESPONSIVE — phones & tablets ===== */
@media (max-width: 700px){
  :root{--sw:0px}

  /* App layout: stack sidebar on top as a top-bar */
  #app{flex-direction:column;height:auto;min-height:100vh;overflow:visible}

  /* Sidebar becomes a compact top-bar */
  .sidebar{
    width:100%!important;flex-direction:row;flex-wrap:wrap;
    align-items:center;padding:0;overflow:visible;
    position:sticky;top:0;z-index:100;flex-shrink:0
  }
  .sb-header{padding:8px 12px;border-bottom:none;border-right:1px solid rgba(255,255,255,.15);flex-shrink:0}
  .sb-header h2{font-size:9px}.sb-header p{font-size:11px;margin-top:0}
  .sb-user{padding:6px 10px;background:rgba(0,0,0,.25);border-bottom:none;
    border-right:1px solid rgba(255,255,255,.1);font-size:11px;flex-shrink:0}
  .sb-name{font-size:11px}.sb-role{font-size:10px}
  .nav-sec{display:none}
  #sbNav{display:flex;flex-direction:row;flex-wrap:wrap;flex:1;align-items:center}
  .nav-item{padding:8px 10px;font-size:11px;border-left:none;border-bottom:3px solid transparent;white-space:nowrap}
  .nav-item.active{border-left:none;border-bottom-color:var(--accent)}
  .logout-btn{margin-top:0;margin-left:auto;padding:8px 12px;font-size:11px;border-top:none;
    border-left:1px solid rgba(255,255,255,.1)}

  /* Main content */
  .main{padding:12px;overflow:visible}

  /* KPI grid: 2 columns on mobile */
  .kpi-grid{grid-template-columns:1fr 1fr}
  .kpi-val{font-size:22px}

  /* Forms: single column */
  .fr2,.fr3{grid-template-columns:1fr!important}

  /* Section tabs: scrollable horizontally */
  .stabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  .stabs::-webkit-scrollbar{display:none}
  .stab{white-space:nowrap;flex-shrink:0;font-size:10px;padding:5px 9px}

  /* Tables: scrollable */
  table{font-size:11px}
  .card{padding:12px}
  .card h3{font-size:13px}

  /* ABCD buttons: wrap properly */
  .abcd-group{gap:4px}
  .abcd-opt{padding:6px 10px;font-size:11px}

  /* Button rows */
  .btn-row{gap:6px}
  .btn{padding:8px 14px;font-size:12px}

  /* Overall rating number */
  .overall-num{font-size:38px}

  /* Login box */
  .login-box{width:94vw;padding:24px 18px}
}

@media (max-width:400px){
  .sb-header p{display:none}
  .nav-item{padding:7px 7px;font-size:10px}
  .kpi-val{font-size:18px}
}

/* ===== PRINT STYLES ===== */
@media print{
  #loginPage,#app>.sidebar,.btn-row,.stabs,.nav-item,.logout-btn,
  .btn,.msg,#formMsg,#printNotice{display:none!important}
  #app{display:block!important;height:auto!important}
  .main{padding:0!important;overflow:visible!important}
  #mainContent{padding:0!important}
  #printArea{display:block!important}
  body{font-size:11px}
  .card{box-shadow:none!important;margin-bottom:12px!important;padding:12px!important;break-inside:avoid}
  table{font-size:11px}
  th{font-size:11px;padding:6px 8px}
  td{padding:5px 8px}
  .overall-num{font-size:36px!important;padding:6px 20px!important}
  .print-header{display:block!important}
  h1,h2,h3{color:#000!important}
}
.print-header{display:none}
#printArea{display:none}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <h1>Training of Regional Trainers<br>on the Revised Grade 6 Curriculum</h1>
      <p class="prog">Department of Education (DepEd)</p>
      <p class="sub">National Capital Region (NCR)</p>
      <span class="badge-prog">M&amp;E &amp; Process Observation System</span>
    </div>
    <label>Username</label>
    <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
    <button class="btn-login" id="loginBtn" onclick="doLogin()">🔐 Login</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="sidebar">
    <div class="sb-header">
      <h2>DepEd NCR</h2>
      <p>Regional Trainers<br>M&amp;E Portal 2026</p>
    </div>
    <div class="sb-user">
      <span class="sb-name" id="sbName">—</span>
      <span class="sb-role" id="sbRole">—</span>
    </div>
    <div id="sbNav"></div>
    <div class="logout-btn" onclick="doLogout()">🚪 Logout</div>
  </div>
  <div class="main" id="mainContent"><div style="padding:20px;color:var(--muted)">Loading…</div></div>
</div>

<script>
// ================================================================
// CONFIG
// ================================================================
// ════════════════════════════════════════════════════════════
// SUPABASE CONFIG — paste your Project URL and anon key here
// ════════════════════════════════════════════════════════════
const SB_URL = 'https://nociqkvsyvpjybecekcj.supabase.co';   // e.g. https://xxxx.supabase.co
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vY2lxa3ZzeXZwanliZWNla2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjI5NTcsImV4cCI6MjA5MjA5ODk1N30.edZRGoGhY9oiSKqUXxczG04gOsk7lXss1Ul_FGoaUTA'; // anon/public key from Settings > API
const IS_SB  = ()=> SB_URL !== 'YOUR_SUPABASE_URL' && SB_KEY !== 'YOUR_SUPABASE_ANON_KEY';

// ================================================================
// BUILT-IN ACCOUNTS (fallback — always works)
// ================================================================
const ACCOUNTS = [
  {id:'sa',name:'Super Administrator',username:'superadmin',password:'Admin@2026!',role:'superadmin',class_assigned:null},
  {id:'c1', name:'M&E Officer — Class 1', username:'me_class1', password:'Class1@2026', role:'me_officer',class_assigned:'Class 1'},
  {id:'c2', name:'M&E Officer — Class 2', username:'me_class2', password:'Class2@2026', role:'me_officer',class_assigned:'Class 2'},
  {id:'c3', name:'M&E Officer — Class 3', username:'me_class3', password:'Class3@2026', role:'me_officer',class_assigned:'Class 3'},
  {id:'c4', name:'M&E Officer — Class 4', username:'me_class4', password:'Class4@2026', role:'me_officer',class_assigned:'Class 4'},
  {id:'c5', name:'M&E Officer — Class 5', username:'me_class5', password:'Class5@2026', role:'me_officer',class_assigned:'Class 5'},
  {id:'c6', name:'M&E Officer — Class 6', username:'me_class6', password:'Class6@2026', role:'me_officer',class_assigned:'Class 6'},
  {id:'c7', name:'M&E Officer — Class 7', username:'me_class7', password:'Class7@2026', role:'me_officer',class_assigned:'Class 7'},
  {id:'c8', name:'M&E Officer — Class 8', username:'me_class8', password:'Class8@2026', role:'me_officer',class_assigned:'Class 8'},
  {id:'c9', name:'M&E Officer — Class 9', username:'me_class9', password:'Class9@2026', role:'me_officer',class_assigned:'Class 9'},
  {id:'c10',name:'M&E Officer — Class 10',username:'me_class10',password:'Class10@2026',role:'me_officer',class_assigned:'Class 10'},
  {id:'c11',name:'M&E Officer — Class 11',username:'me_class11',password:'Class11@2026',role:'me_officer',class_assigned:'Class 11'},
  {id:'c12',name:'M&E Officer — Class 12',username:'me_class12',password:'Class12@2026',role:'me_officer',class_assigned:'Class 12'},
];

// ================================================================
// SUPABASE HELPERS
// ================================================================
async function sbGet(t,q=''){
  const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(`${t} ${r.status}`);
  return r.json();
}
async function sbUpsert(t,data){
  const conflict=t==='me_observations'?'?on_conflict=username,training_day':'';
  const r=await fetch(`${SB_URL}/rest/v1/${t}${conflict}`,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(data)
  });
  if(!r.ok){
    let errMsg=`save ${t} HTTP ${r.status}`;
    try{const j=await r.json();errMsg+=' — '+(j.message||j.hint||JSON.stringify(j));}catch(e){}
    throw new Error(errMsg);
  }
}
async function sbPatch(t,q,data){
  const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(`patch ${t} ${r.status}`);
}
async function sbDelete(t,q){
  await fetch(`${SB_URL}/rest/v1/${t}${q}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
}

// Local storage for offline/no-supabase
const LS_KEY = 'me_obs_2026';
const LS_IMPORT_KEY = 'me_imported_2026';
function lsSave(records){ try{localStorage.setItem(LS_KEY,JSON.stringify(records));}catch(e){} }
function lsLoad(){ try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return[];} }
function lsLoadImported(){ try{return JSON.parse(localStorage.getItem(LS_IMPORT_KEY)||'[]');}catch(e){return[];} }
function lsSaveImported(records){ try{localStorage.setItem(LS_IMPORT_KEY,JSON.stringify(records));}catch(e){} }

// ================================================================
// STATE
// ================================================================
let CU = null; // current user
let CS = 'profile'; // current form section
let FD = null; // form data

// ================================================================
// AUTH
// ================================================================
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  err.style.display='none';
  if(!u||!p){err.textContent='⚠️ Enter username and password.';err.style.display='block';return;}
  btn.textContent='⏳ Logging in…';btn.disabled=true;

  // Try DB first, then fallback
  let found=null;
  if(IS_SB()){
    try{
      const rows=await sbGet('me_users',`?username=eq.${encodeURIComponent(u)}&password=eq.${encodeURIComponent(p)}&select=*`);
      if(rows&&rows.length) found=rows[0];
    }catch(e){ console.warn('DB login failed:',e.message); }
  }
  if(!found) found=ACCOUNTS.find(a=>a.username===u&&a.password===p)||null;

  btn.textContent='🔐 Login';btn.disabled=false;
  if(!found){
    err.textContent='❌ Invalid username or password.';err.style.display='block';return;
  }
  CU=found;
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sbName').textContent=CU.name;
  document.getElementById('sbRole').textContent=CU.role==='superadmin'?'⭐ Super Administrator':`📋 M&E Officer — ${CU.class_assigned}`;
  buildNav();
  if(CU.role==='superadmin'){
    // Test Supabase connectivity immediately on login so admin knows if cloud sync is working
    if(IS_SB()){
      sbGet('me_observations','?limit=1').then(r=>{
        window._sbStatus={ok:true,count:null,ts:new Date().toISOString()};
      }).catch(er=>{
        window._sbStatus={ok:false,error:er.message,ts:new Date().toISOString()};
        // Show a one-time warning on login
        setTimeout(()=>{
          const w=document.createElement('div');
          w.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#c62828;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:90vw;text-align:center;line-height:1.7';
          w.innerHTML=`🚨 <b>Supabase unreachable!</b> Cross-device sync will NOT work.<br>

// ================================================================
// RATING UTILITIES
// ================================================================
function colPts(c){return c==='A'?4:c==='B'?3:c==='C'?2:c==='D'?1:null;}
function avg(...vs){const f=vs.filter(x=>x!=null);return f.length?f.reduce((a,b)=>a+b,0)/f.length:null;}
function ratingClass(r){
  if(r==null) return 'r-none';
  if(r>=3.6)  return 'r-exceed';
  if(r>=2.6)  return 'r-met';
  if(r>=1.6)  return 'r-partial';
  return 'r-low';
}
function ratingLabel(r){
  if(r==null) return '—';
  if(r>=3.6) return 'Exceeded Expectations';
  if(r>=2.6) return 'Fully Met Expectations';
  if(r>=1.6) return 'Partially Met';
  return 'Minimal Conformance';
}
function badgeClass(r){
  if(r==null) return 'b-none';
  if(r>=3.6)  return 'b-met';
  if(r>=2.6)  return 'b-met';
  if(r>=1.6)  return 'b-partial';
  return 'b-low';
}
function computeRatings(fd){
  if(!fd) return {};
  const p=avg(colPts(fd.part?.r1),colPts(fd.part?.r2));
  const d=colPts(fd.design?.col);
  const rp=avg(colPts(fd.rps?.r1),colPts(fd.rps?.r2));
  const l=avg(colPts(fd.lrms?.r1),colPts(fd.lrms?.r2),colPts(fd.lrms?.r3));
  const pm=colPts(fd.pm?.col);
  const ev=colPts(fd.eval?.col);
  const en=colPts(fd.envi?.col);
  const all=[p,d,rp,l,pm,ev,en].filter(x=>x!=null);
  const overall=all.length?all.reduce((a,b)=>a+b,0)/all.length:null;
  return{part:p,design:d,rps:rp,lrms:l,pm,eval:ev,envi:en,overall};
}

async function _loadFormData(day){
  if(IS_SB()){
    try{
      const sbRecs=await sbGet('me_observations','?username=eq.'+encodeURIComponent(CU.username)+'&order=training_day.asc');
      if(sbRecs&&sbRecs.length){
        const local=lsLoad();
        sbRecs.forEach(sr=>{
          const idx=local.findIndex(r=>r.username===sr.username&&r.training_day===sr.training_day);
          if(idx>=0){
            const localRec=local[idx];
            // NEVER overwrite a submitted local record with a draft from Supabase
            // This protects against the case where Supabase upsert failed silently
            if(localRec.status==='submitted'&&sr.status==='draft'){
              // Re-push the submitted record back to Supabase to fix the stale draft
              const sbPayload={username:localRec.username,class_name:localRec.class_name,
                training_day:localRec.training_day,obs_date:localRec.obs_date||null,
                status:localRec.status,data:localRec.data,updated_at:localRec.updated_at};
              if(localRec.submitted_at) sbPayload.submitted_at=localRec.submitted_at;
              sbUpsert('me_observations',sbPayload).catch(e=>console.warn('Re-sync failed:',e.message));
              return; // keep local record as-is
            }
            // Only overwrite if Supabase record is strictly newer
            const sbDate=new Date(sr.updated_at||0);
            const lcDate=new Date(localRec.updated_at||0);
            if(sbDate>lcDate) local[idx]=sr;
          } else {
            local.push(sr); // new record from another device
          }
        });
        lsSave(local);
      }
    }catch(e){console.warn('Supabase fetch failed:',e.message);}
  }
  const allMyRecs=lsLoad().filter(r=>r.username===CU.username);
  const dayStatus={};
  allMyRecs.forEach(r=>{dayStatus[r.training_day]=r.status;});
  const existing=allMyRecs.find(r=>r.training_day===day);
  const isSubmitted=existing&&existing.status==='submitted';
  if(existing&&existing.data){FD=JSON.parse(JSON.stringify(existing.data));FD.meta.training_day=day;}
  else{initFD();FD.meta.training_day=day;}
  return{dayStatus,isSubmitted};
}

// ================================================================
// COLLECT ALL
// ================================================================
function collectSec(k){
  const m={profile:collectProfile,incidents:collectIncidents,part:collectPart,
    design:collectDesign,rps:collectRPs,lrms:collectLRMs,pm:collectPM,
    eval:collectEval,envi:collectEnvi,summary:collectSummary};
  (m[k]||function(){})();
}
function collectAll(){
  // Each collect fn checks for DOM elements via getElementById/rv before writing to FD,
  // so non-visible sections are naturally skipped (their elements return null/empty).
  // We call only the CURRENT section explicitly, plus safe-collect the rest.
  // Safe wrappers: only overwrite FD if the key DOM element actually exists.
  _safeCollect('profile',  collectProfile,  'm_date');
  _safeCollect('incidents',collectIncidents,null,true); // always safe (no DOM deps that zero data)
  _safeCollect('part',     collectPart,     'p_tar');
  _safeCollect('design',   collectDesign,   'des_n_professional_standards');
  _safeCollect('rps',      collectRPs,      'rp_dev');
  _safeCollect('lrms',     collectLRMs,     'lrm_obs');
  _safeCollect('pm',       collectPM,       'pm_obs');
  _safeCollect('eval',     collectEval,     'ev_obs');
  _safeCollect('envi',     collectEnvi,     'en_obs');
  _safeCollect('summary',  collectSummary,  'sum_f_part');
}
function _safeCollect(secKey, fn, probeId, alwaysRun){
  // Only collect if the section's DOM is currently rendered (probe element exists),
  // OR if it's the current section (CS), OR alwaysRun is set.
  if(alwaysRun || CS===secKey || (probeId && document.getElementById(probeId))){
    fn();
  }
}

// SAVE / SUBMIT / LOAD
// ================================================================
async function saveDraft(){
  collectSec(CS); // only collect currently visible section — FD already holds other sections
  const msg=document.getElementById('formMsg');
  try{
    const payload=mkPayload('draft'); payload._allowDowngrade=true; // explicit user action
    await saveObs(payload);
    showMsg(msg,'✅ Draft saved for '+FORM_DAY+'!','success');
    // Update day selector badge for this day
    document.querySelectorAll('.stab[onclick^="renderForm"]').forEach(btn=>{
      if(btn.textContent.includes(FORM_DAY))btn.innerHTML='📝 '+FORM_DAY;
    });
  }catch(er){showMsg(msg,'❌ Save error: '+er.message,'error');}
}
async function submitForm(){
  collectSec(CS); // only collect the currently visible section — FD already has all others
  const msg=document.getElementById('formMsg');
  if(!FD.meta.class_manager||!FD.meta.trainers){
    showMsg(msg,'⚠️ Please complete Class Manager and Trainers fields in Profile before submitting.','error');return;
  }
  if(!confirm('Submit this observation for '+FORM_DAY+'? It will be locked after submission.'))return;
  try{
    const payload=mkPayload('submitted');
    payload.submitted_at=new Date().toISOString();
    await saveObs(payload);
    showMsg(msg,'✅ '+FORM_DAY+' observation submitted successfully! The form is now locked.','success');

    // Update button row: hide Save Draft & Load Draft, show Submitted + Unlock badges
    const btnRow=document.getElementById('formBtnRow');
    if(btnRow){
      btnRow.innerHTML=`
        <span class="btn" style="background:#2e7d32;color:#fff;cursor:default">✅ Submitted</span>
        <button class="btn" style="background:#e65100;color:#fff" onclick="undoSubmission()" title="Unlock to make corrections">🔓 Undo Submission</button>
        <button class="btn btn-pdf" onclick="printMyReport()">🖨️ Print / Save PDF</button>
      `;
    }
    // Lock all form fields
    _lockFormFields();
    // Refresh day selector badges
    const dayBtns=document.querySelectorAll('.stab[onclick^="renderForm"]');
    const allMyRecs=lsLoad().filter(r=>r.username===CU.username);
    const dayStatus={};
    allMyRecs.forEach(r=>{dayStatus[r.training_day]=r.status;});
    dayBtns.forEach(btn=>{
      const dayMatch=btn.textContent.trim().match(/(Day \d)/);
      if(dayMatch){
        const d=dayMatch[1];
        const st=dayStatus[d];
        btn.innerHTML=(st==='submitted'?'✅ ':st==='draft'?'📝 ':'○ ')+d;
      }
    });
  }catch(er){showMsg(msg,'❌ Submit error: '+er.message,'error');}
}

// ================================================================
// UNDO SUBMISSION — revert submitted → draft so officer can edit
// ================================================================
async function undoSubmission(){
  if(!confirm('🔓 Undo the submission for '+FORM_DAY+'?\n\nThis reverts it to Draft so you can make corrections. The superadmin will see it as unsubmitted.')) return;
  const msg=document.getElementById('formMsg');
  try{
    const payload=mkPayload('draft');
    await saveObs(payload);
    showMsg(msg,'🔓 Submission undone. '+FORM_DAY+' is now a Draft — edit and re-submit when ready.','info');
    // Restore edit buttons
    const btnRow=document.getElementById('formBtnRow');
    if(btnRow){
      btnRow.innerHTML=`
        <button class="btn btn-primary" onclick="saveDraft()">💾 Save Draft</button>
        <button class="btn btn-success" onclick="submitForm()">📤 Submit</button>
        <button class="btn" style="background:#607d8b;color:#fff" onclick="loadDraft()">🔄 Load Draft</button>
        <button class="btn btn-pdf" onclick="printMyReport()">🖨️ Print / Save PDF</button>
      `;
    }
    // Unlock all form fields
    document.querySelectorAll('#secBody input:not([id="m_day"]):not([id="m_class"]):not([id="m_officer"]), #secBody select, #secBody textarea').forEach(el=>{el.disabled=false;});
    document.querySelectorAll('#secBody .abcd-opt').forEach(el=>{el.style.pointerEvents='';el.style.opacity='';});
    // Update day selector badge
    document.querySelectorAll('.stab[onclick^="renderForm"]').forEach(btn=>{
      if(btn.textContent.includes(FORM_DAY)) btn.innerHTML='📝 '+FORM_DAY;
    });
    // Remove lock message
    document.querySelectorAll('#formMsg ~ .msg-success, .msg.show').forEach(el=>{
      if(el.textContent.includes('submitted and locked')) el.className='msg';
    });
  }catch(er){showMsg(msg,'❌ Undo error: '+er.message,'error');}
}

async function loadDraft(){
  const day=FORM_DAY||FD?.meta?.training_day||'Day 1';
  const msg=document.getElementById('formMsg');
  try{
    let found=null;
    if(IS_SB()){
      const rows=await sbGet('me_observations',`?username=eq.${encodeURIComponent(CU.username)}&training_day=eq.${encodeURIComponent(day)}&order=updated_at.desc&limit=1`);
      if(rows&&rows.length){found=rows[0];FD=JSON.parse(JSON.stringify(found.data));FD.meta.training_day=day;}
    }
    if(!found){
      const local=lsLoad().filter(r=>r.username===CU.username&&r.training_day===day);
      if(local.length){
        found=local[local.length-1];
        FD=JSON.parse(JSON.stringify(found.data));
        FD.meta.training_day=day;
        showMsg(msg,`✅ Loaded ${found.status==='submitted'?'submitted form':'draft'} for ${day}`,'success');

async function saveObs(payload){
  // ── Step 1: Save into the shared localStorage pool (LS_KEY) ──
  // LS_KEY is read by BOTH M&E officer views AND superadmin loadAllSubs().
  // All accounts on the same browser share the same localStorage, so the
  // superadmin will automatically see M&E submissions made in other tabs.
  // Guard: never downgrade a submitted record back to draft in storage
  const existing_local=lsLoad();
  const existingRec=existing_local.find(r=>r.username===payload.username&&r.training_day===payload.training_day);
  if(existingRec&&existingRec.status==='submitted'&&payload.status==='draft'){
    // Only allow undo if explicitly requested (payload has _allowDowngrade flag)
    if(!payload._allowDowngrade){
      console.log('Skipping draft save — record already submitted');
      return; // protect submitted data
    }
  }
  const local=existing_local.filter(r=>!(r.username===payload.username&&r.training_day===payload.training_day));
  local.push(payload);
  lsSave(local);

  // ── Step 2: Notify superadmin tabs (works on ALL browsers incl. Safari) ──
  // BroadcastChannel is not supported on Safari/iOS, so we use a
  // localStorage ping that triggers the window storage event cross-tab.
  try{
    const ping={type:'obs_saved',username:payload.username,
      training_day:payload.training_day,status:payload.status,
      class_name:payload.class_name,ts:payload.updated_at,_r:Math.random()};
    localStorage.setItem('me_portal_ping',JSON.stringify(ping));
    // Also try BroadcastChannel for browsers that support it (faster)
    if(typeof BroadcastChannel!=='undefined'){
      try{const bc=new BroadcastChannel('me_portal_sync');bc.postMessage(ping);bc.close();}catch(e){}
    }
  }catch(e){}

  // ── Step 3: Save to Supabase if configured (multi-device, real-time sync) ──
  if(IS_SB()){
    try{
      // GUARD: Never overwrite a submitted record in Supabase with a draft
      // Check current Supabase status before upserting
      if(payload.status==='draft'){
        try{
          const existing=await sbGet('me_observations','?username=eq.'+encodeURIComponent(payload.username)+'&training_day=eq.'+encodeURIComponent(payload.training_day)+'&select=status');
          if(existing&&existing.length&&existing[0].status==='submitted'){
            console.log('Supabase guard: blocking draft upsert — record already submitted in Supabase');
            return; // hard stop — never downgrade submitted to draft in Supabase
          }
        }catch(e){}
      }
      // Use upsert — the unique(username, training_day) constraint handles insert vs update
      const sbPayload={
        username: payload.username,
        class_name: payload.class_name,
        training_day: payload.training_day,
        obs_date: payload.obs_date||null,
        status: payload.status,
        data: payload.data,
        updated_at: payload.updated_at,
      };
      if(payload.submitted_at) sbPayload.submitted_at=payload.submitted_at;
      await sbUpsert('me_observations', sbPayload);
    }catch(er){
      console.error('Supabase save failed:',er.message);
      // Show a non-blocking warning — data is safe in localStorage but won't sync cross-device
      const existingWarn=document.getElementById('_sbWarn');
      if(!existingWarn){
        const w=document.createElement('div');
        w.id='_sbWarn';
        w.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#e65100;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:90vw;text-align:center';
        w.innerHTML='⚠️ Cloud sync failed — data saved locally only.<br><span style="font-size:10px;opacity:.85">Check internet connection. Error: '+er.message+'</span>';
        document.body.appendChild(w);
        setTimeout(()=>{if(w.parentNode)w.remove();},8000);
      }
    }
  }
}

// ── Cross-tab sync listener — works on ALL browsers including Safari ──
// Uses window storage event (universal) + BroadcastChannel (where supported).
(function initSyncListener(){
  function handlePing(d){
    if(!d) return;
    if(!CU) return;

    // Handle deletion ping — for M&E officers whose draft was deleted
    if(d.type==='obs_deleted'){
      if(CU.role==='me_officer'&&CU.username===d.username){
        // Remove from localStorage
        const local=lsLoad().filter(r=>!(r.username===d.username&&r.training_day===d.training_day));
        lsSave(local);
        // If currently viewing that day, reset form
        if(FORM_DAY===d.training_day){
          initFD();
          FD.meta.training_day=d.training_day;
          renderForm(d.training_day);
          // Show notification
          setTimeout(()=>{
            const msg=document.getElementById('formMsg');
            if(msg){msg.textContent='⚠️ Your draft for '+d.training_day+' was deleted by the administrator. Form has been reset.';msg.className='msg msg-error show';}
          },300);
        }
      }
      // Also refresh superadmin if open
      if(CU.role==='superadmin'){
        const active=document.querySelector('.nav-item.active');
        if(active&&active.id==='nav_dash') renderDashboard();
      }
      return;
    }

    // Handle save/submit ping — superadmin only
    if(d.type!=='obs_saved') return;
    if(CU.role!=='superadmin') return;
    const toast=document.createElement('div');
    const icon=d.status==='submitted'?'📤':'💾';
    toast.style.cssText='position:fixed;top:16px;right:16px;background:#1a3a5c;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:opacity .4s;max-width:90vw';
    toast.textContent=icon+' '+d.class_name+' — '+d.training_day+' '+d.status;
    document.body.appendChild(toast);
    const active=document.querySelector('.nav-item.active');
    if(active){
      if(active.id==='nav_dash') renderDashboard();
      else if(active.id==='nav_subs') renderAllSubs();
      else if(active.id==='nav_consol') renderConsolidated();
    }
    setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),400);},4000);
  }
  // localStorage storage event — works cross-tab on ALL browsers
  window.addEventListener('storage',function(e){
    if(e.key==='me_portal_ping'&&e.newValue){
      try{handlePing(JSON.parse(e.newValue));}catch(e){}
    }
    // Also refresh if the main data key changed (catches any direct saves)
    if(e.key==='me_obs_2026'&&CU&&CU.role==='superadmin'){
      if(!document.hidden){
        clearTimeout(window._storageRefreshT);
        window._storageRefreshT=setTimeout(()=>{
          const active=document.querySelector('.nav-item.active');
          if(active){
            if(active.id==='nav_dash') renderDashboard();
            else if(active.id==='nav_subs') renderAllSubs();
            else if(active.id==='nav_consol') renderConsolidated();
          }
        },800);
      }
    }
  });
  // BroadcastChannel — faster, for browsers that support it (not Safari)
  if(typeof BroadcastChannel!=='undefined'){
    try{
      const bc=new BroadcastChannel('me_portal_sync');
      bc.onmessage=function(ev){handlePing(ev.data);};
    }catch(e){}
  }
})();

window.exportSub=function(sub){
  const json=JSON.stringify([sub],null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ME_${(sub.class_name||'').replace(/\s/g,'_')}_${(sub.training_day||'').replace(/\s/g,'_')}_${sub.obs_date||'exported'}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
};

const DAYS_ALL=['Day 1','Day 2','Day 3','Day 4','Day 5'];

// Check if a record has all 10 sections meaningfully filled
function isSectionFilled(fd){
  if(!fd) return 0;
  let filled=0;
  // Section 1: Profile — has obs_date filled
  if(fd.meta?.obs_date) filled++;
  // Section 2: Incidents — always counts (can be legitimately empty)
  if(fd.incidents!==undefined) filled++;
  // Section 3: Participants — has at least one rating
  if(fd.part?.r1) filled++;
  // Section 4: Program Design — has overall rating
  if(fd.design?.col) filled++;
  // Section 5: Resource Persons — has at least one rating
  if(fd.rps?.r1) filled++;
  // Section 6: LRMs — has at least one rating
  if(fd.lrms?.r1) filled++;
  // Section 7: Program Management — has overall rating
  if(fd.pm?.col) filled++;
  // Section 8: Evaluation Scheme — has overall rating
  if(fd.eval?.col) filled++;
  // Section 9: Environment — has overall rating
  if(fd.envi?.col) filled++;
  // Section 10: Summary — always counts (findings/recommendations are optional)
  if(fd.summary!==undefined) filled++;
  return filled; // out of 10
}

    <table>

        }).join('');

        const submittedCount=DAYS_ALL.filter(d=>classRecs.find(r=>r.training_day===d&&r.status==='submitted')).length;

          </td>
        </tr>`;
      }).join('')}

}

window.adminDeleteDraft=async function(className,trainingDay,username){
  if(!confirm(`🗑 DELETE the draft for ${className} — ${trainingDay}?\n\nThis will permanently delete the data. The M&E officer will see a blank form when they log in next.`)) return;
  try{
    if(IS_SB()){
      await sbDelete('me_observations',`?username=eq.${encodeURIComponent(username)}&training_day=eq.${encodeURIComponent(trainingDay)}`);
    }
    // Also remove from localStorage
    const local=lsLoad().filter(r=>!(r.username===username&&r.training_day===trainingDay));
    lsSave(local);
    // Notify any open officer tabs via ping
    try{
      const ping={type:'obs_deleted',username,training_day:trainingDay,class_name:className,ts:new Date().toISOString(),_r:Math.random()};
      localStorage.setItem('me_portal_ping',JSON.stringify(ping));
      if(typeof BroadcastChannel!=='undefined'){
        const bc=new BroadcastChannel('me_portal_sync');bc.postMessage(ping);bc.close();
      }
    }catch(e){}
    // Immediately re-render dashboard WITHOUT alert so refresh happens first
    await renderDashboard();
    // Show subtle success toast instead of blocking alert
    const t=document.createElement('div');
    t.style.cssText='position:fixed;top:16px;right:16px;background:#2e7d32;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:opacity .4s';
    t.textContent='🗑 Deleted: '+className+' — '+trainingDay;
    document.body.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},3000);
  }catch(e){
    alert('❌ Delete failed: '+e.message);
  }
};

window.exportAllSubs=async function(){
  const allSubs=await loadAllSubs();
  const submitted=allSubs.filter(s=>s.status==='submitted');
  if(!submitted.length){alert('No submitted records to export.');return;}
  const json=JSON.stringify(submitted,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ME_Consolidated_All_${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
};

window.importSubmissions=function(files){
  if(!files||!files.length) return;
  let imported=lsLoadImported();
  let count=0;
  const readers=Array.from(files).map(file=>new Promise(res=>{
    const fr=new FileReader();
    fr.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const records=Array.isArray(data)?data:[data];
        records.forEach(rec=>{
          if(!rec.username||!rec.training_day) return;
          const idx=imported.findIndex(s=>s.username===rec.username&&s.training_day===rec.training_day);
          if(idx>=0) imported[idx]=rec; else imported.push(rec);
          count++;
        });
      }catch(e){alert('⚠️ Invalid JSON file: '+file.name);}
      res();
    };
    fr.readAsText(file);
  }));
  Promise.all(readers).then(()=>{
    lsSaveImported(imported);
    alert(`✅ Successfully imported ${count} record(s). Refreshing dashboard...`);
    renderDashboard();
  });
};

// SHARED UTILITIES

async function loadAllSubs(){
  let subs=[];
  let sbLoaded=false;
  let sbError=null;
  if(IS_SB()){
    try{
      subs=await sbGet('me_observations','?order=class_name.asc,training_day.asc')||[];
      sbLoaded=true;
      window._sbStatus={ok:true,count:subs.length,ts:new Date().toISOString()};
    }
    catch(er){
      console.warn('DB load failed, falling back to localStorage:',er);
      sbError=er.message;
      window._sbStatus={ok:false,error:er.message,ts:new Date().toISOString()};
    }
  }

  // ALWAYS merge localStorage — treat localStorage as a safety net.
  // submitted local record always wins over draft in Supabase (protects against silent upsert failures)
  const local=lsLoad();
  local.forEach(loc=>{
    const idx=subs.findIndex(s=>s.username===loc.username&&s.training_day===loc.training_day);
    if(idx>=0){
      const sbRec=subs[idx];
      // Never let a Supabase draft overwrite a locally-submitted record
      if(loc.status==='submitted'&&sbRec.status==='draft'){subs[idx]=loc;return;}
      // Otherwise prefer whichever is more recent
      const sbDate=new Date(sbRec.updated_at||0);
      const lcDate=new Date(loc.updated_at||0);
      if(lcDate>sbDate) subs[idx]=loc;
    } else {
      subs.push(loc); // record exists locally but not in Supabase yet
    }
  });

  // Merge with imported subs (superadmin import feature)
  const imported=lsLoadImported();
  imported.forEach(imp=>{
    const idx=subs.findIndex(s=>s.username===imp.username&&s.training_day===imp.training_day);
    if(idx>=0){
      const sbDate=new Date(subs[idx].updated_at||0);
      const impDate=new Date(imp.updated_at||0);
      if(impDate>sbDate) subs[idx]=imp;
    } else {
      subs.push(imp);
    }
  });

  // If Supabase failed, show a warning banner so superadmin knows
  if(IS_SB()&&!sbLoaded){
    _showSbWarningBanner(sbError);
  }

  return subs;
}

function _showSbWarningBanner(errMsg){
  // Remove existing banner first
  const old=document.getElementById('_sbLoadWarn');
  if(old)old.remove();
  const w=document.createElement('div');
  w.id='_sbLoadWarn';
  w.style.cssText='background:#fff3e0;color:#e65100;border:1.5px solid #ffb74d;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:600;margin-bottom:12px;line-height:1.7';
  w.innerHTML=`⚠️ <b>Supabase sync error</b> — Could not load cloud data. Showing local/imported data only.<br>
    <span style="font-size:11px;font-weight:400">Error: ${errMsg||'Unknown'}</span><br>
    <span style="font-size:11px;font-weight:400">Fix: Go to <b>Supabase → Authentication → Policies</b> and ensure the <code>me_observations</code> table has <b>SELECT allowed for anon role</b>.</span>`;
  const mc=document.getElementById('mainContent');
  if(mc) mc.prepend(w);
}

        <tr><th>Category</th><th>Rating</th><th>Description</th><th>Suggested Action</th></tr>
        ${CATS.map(c=>{const r=R[c.k];return`<tr>
          <td><b>${c.lbl}</b></td>
          <td><span class="badge ${badgeClass(r)}">${r!=null?r.toFixed(2):'—'}</span></td>
          <td style="font-size:11px">${ratingLabel(r)}</td>
          <td style="font-size:11px">${r!=null&&r<2.6?'Feedback + Debriefing':r!=null?'Feedback to Program Owner':'—'}</td>
        </tr>`;}).join('')}
      </table>
    </div>
    <div class="card"><h3>Profile</h3>
      <table>
        <tr><td><b>PD Program</b></td><td colspan="3">${fd.meta?.pd_title||'—'}</td></tr>
        <tr><td><b>Class</b></td><td>${fd.meta?.class_name||'—'}</td><td><b>Day</b></td><td>${fd.meta?.training_day||'—'}</td></tr>
        <tr><td><b>Date</b></td><td>${fd.meta?.obs_date||'—'}</td><td><b>No. Participants</b></td><td>${fd.meta?.num_participants||'—'}</td></tr>
        <tr><td><b>Class Manager</b></td><td>${fd.meta?.class_manager||'—'}</td><td><b>Trainers</b></td><td>${fd.meta?.trainers||'—'}</td></tr>
      </table>
    </div>
    ${fd.incidents?.length?`<div class="card"><h3>Critical Incidents (${fd.incidents.length})</h3>
      ${fd.incidents.map((inc,i)=>`<div style="border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">
        <b>Incident #${i+1}</b><br>
        <span style="color:var(--muted);font-size:11px">Situation:</span> ${inc.situation||'—'}<br>
        <span style="color:var(--muted);font-size:11px">Action:</span> ${inc.action||'—'}<br>
        <span style="color:var(--muted);font-size:11px">Result:</span> ${inc.result||'—'}
      </div>`).join('')}</div>`:''}
    <div class="card"><h3>Checklists Summary</h3>
      <table>
        <tr><th>Section</th><th>Items Met</th><th>Total</th><th>Percentage</th></tr>
        <tr><td>Resource Persons Standards (DM 44)</td><td>${rpCnt}</td><td>${RP_STDS.length}</td><td>${Math.round(rpCnt/RP_STDS.length*100)}%</td></tr>
        <tr><td>Program Management Standards</td><td>${pmCnt}</td><td>${PM_ITEMS.length}</td><td>${Math.round(pmCnt/PM_ITEMS.length*100)}%</td></tr>
        <tr><td>Learning Environment Indicators</td><td>${enCnt}</td><td>${ENV_ITEMS.length}</td><td>${Math.round(enCnt/ENV_ITEMS.length*100)}%</td></tr>
      </table>
    </div>
    <div class="card"><h3>Findings &amp; Recommendations</h3>
      <table>
        <tr><th>Category</th><th>Major Observations &amp; Findings</th><th>Recommendations</th></tr>
        ${CATS.map(c=>`<tr>
          <td><b>${c.lbl}</b></td>
          <td>${fd.summary?.findings?.[c.k]||'—'}</td>
          <td>${fd.summary?.recommendations?.[c.k]||'—'}</td>
        </tr>`).join('')}
      </table>
    </div>`;
}

// Cross-tab sync now handled by BroadcastChannel (see initBroadcastListener above)

// Background poll — superadmin only, every 10 minutes (600000ms).
// BroadcastChannel handles instant same-browser sync; this poll
// catches Supabase updates from other devices in the background
// WITHOUT interrupting the M&E officer who may be encoding.
let _pollTimer=null;
function startAdminPoll(){
  stopAdminPoll();
  _pollTimer=setInterval(()=>{
    if(!CU||CU.role!=='superadmin') return;
    // Only silently refresh data — do NOT re-render if user is
    // actively scrolled/reading; just update the KPI badges quietly.
    _silentAdminRefresh();
  },IS_SB()?60000:600000); // 60s with Supabase (cross-device), 10min without
}
function stopAdminPoll(){ clearInterval(_pollTimer); }

// ── M&E Officer auto-save every 2 minutes ──
// Silently saves whatever the officer has encoded so far.
// This prevents data loss on accidental browser close or crash.
let _autosaveTimer=null;
function startOfficerAutosave(){
  stopOfficerAutosave();
  _autosaveTimer=setInterval(async ()=>{
    if(!CU||CU.role!=='me_officer') return;
    if(!FD||!FORM_DAY) return;
    // Check BOTH localStorage AND FD status — never autosave if submitted
    // This prevents overwriting a submitted record from another device/tab
    const recs=lsLoad().filter(r=>r.username===CU.username&&r.training_day===FORM_DAY);
    if(recs.length&&recs[0].status==='submitted') return;
    // Also check Supabase directly before autosaving — critical for multi-device protection
    if(IS_SB()){
      try{
        const sbCheck=await sbGet('me_observations','?username=eq.'+encodeURIComponent(CU.username)+'&training_day=eq.'+encodeURIComponent(FORM_DAY)+'&select=status');
        if(sbCheck&&sbCheck.length&&sbCheck[0].status==='submitted'){
          // Supabase says submitted — update localStorage and stop autosaving this day
          if(recs.length){recs[0].status='submitted';const all=lsLoad();const idx=all.findIndex(r=>r.username===CU.username&&r.training_day===FORM_DAY);if(idx>=0){all[idx].status='submitted';lsSave(all);}}
          return;
        }
      }catch(e){}
    }
    try{
      collectSec(CS); // collect currently visible section
      const pl=mkPayload('draft');
      await saveObs(pl);
      // Show a tiny subtle indicator (not disruptive)
      const ind=document.createElement('div');
      ind.style.cssText='position:fixed;bottom:8px;right:8px;background:rgba(46,125,50,.85);color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;z-index:8888;opacity:1;transition:opacity 1s';
      ind.textContent='✓ Auto-saved';
      document.body.appendChild(ind);
      setTimeout(()=>{ind.style.opacity='0';setTimeout(()=>ind.remove(),1000);},2000);
    }catch(e){}
  },120000); // every 2 minutes
}
function stopOfficerAutosave(){ clearInterval(_autosaveTimer); }
let _lastSubsHash='';
async function _silentAdminRefresh(){
  if(!IS_SB()) return; // No Supabase = no cross-device sync needed
  try{
    const subs=await sbGet('me_observations','?order=updated_at.desc');
    if(!subs||!subs.length) return;
    // Hash: count + latest updated_at — cheap change detection
    const hash=subs.length+'|'+subs[0].updated_at;
    if(hash===_lastSubsHash) return; // nothing changed, skip re-render
    _lastSubsHash=hash;
    // Data changed — refresh current admin view
    const active=document.querySelector('.nav-item.active');
    if(!active) return;
    if(active.id==='nav_dash') renderDashboard();
    else if(active.id==='nav_consol') renderConsolidated();
    else if(active.id==='nav_subs') renderAllSubs();
  }catch(e){}
}


// Small helpers
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function g(id){const el=document.getElementById(id);return el?el.value:'';}
function rv(name){const el=document.querySelector(`.abcd-opt.sel[data-name="${name}"]`);return el?el.dataset.val:'';}
function showMsg(el,txt,type){el.textContent=txt;el.className=`msg msg-${type} show`;if(type==='success')setTimeout(()=>{el.className='msg msg-success';},5000);}

function abcd(name,selected){
  return`<div class="abcd-group">${ABCD.map(o=>`
    <div class="abcd-opt${selected===o.v?' sel':''}" data-name="${name}" data-val="${o.v}" onclick="selAbcd(this,'${name}')">
      ${o.lbl}
    </div>`).join('')}</div>`;
}
window.selAbcd=function(el,name){
  document.querySelectorAll(`.abcd-opt[data-name="${name}"]`).forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
};
window.updChk=function(prefix,tot,badgeId){
  let cnt=0;for(let i=0;i<tot;i++){const cb=document.getElementById(`${prefix}_${i}`);if(cb&&cb.checked)cnt++;}
  const b=document.getElementById(badgeId);
  if(!b)return;
  const pct=Math.round(cnt/tot*100);
  b.textContent=`${cnt}/${tot} (${pct}%)`;
  b.className=`chk-count ${pct>=91?'b-met':pct>=51?'b-partial':'b-low'}`;
};
</script>
