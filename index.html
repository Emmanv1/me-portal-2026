const RLABELS={1:'Poor',2:'Fair',3:'Satisfactory',4:'Good',5:'Excellent'};

function initData(){
  const d={};
  SECTIONS.forEach(s=>s.fields.forEach(f=>{d[f.k]=f.t==='rating'?'3':''}));
  return d;
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let state={
  screen:'login',// login | form | superadmin
  user:null,
  loginUser:'',loginPass:'',loginErr:'',
  formData:initData(),
  formStatus:'empty',// empty|draft|submitted
  activeSection:1,
  busy:false,
  toast:null,
  superSubs:[],superLoading:true,superSelected:null,superSection:1,superLastUpdate:null,
  confirmOpen:false,confirmMsg:'',confirmCb:null,
};

let pollTimer=null;
let toastTimer=null;

// ─── RENDER ENGINE ─────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(!app)return;
  if(state.screen==='login')app.innerHTML=renderLogin();
  else if(state.screen==='form')app.innerHTML=renderForm();
  else if(state.screen==='superadmin')app.innerHTML=renderSuperAdmin();
  attachEvents();
}

function showToast(msg,type='success'){
  clearTimeout(toastTimer);
  state.toast={msg,type};
  render();
  toastTimer=setTimeout(()=>{state.toast=null;render();},3500);
}

function setState(patch){
  Object.assign(state,patch);
  render();
}

// ─── STORAGE HELPERS ───────────────────────────────────────────────────────
async function storageSave(key,val,shared=false){
  try{await window.storage.set(key,typeof val==='string'?val:JSON.stringify(val),shared);return true;}
  catch(e){console.error('storage.set error',e);return false;}
}
async function storageLoad(key,shared=false){
  try{
    const r=await window.storage.get(key,shared);
    if(!r)return null;
    try{return JSON.parse(r.value);}catch{return r.value;}
  }catch{return null;}
}

// ─── AUTH ──────────────────────────────────────────────────────────────────
async function doLogin(){
  const u=state.loginUser.trim();
  const acct=ALL_ACCTS[u];
  if(!acct||acct.password!==state.loginPass){
    setState({loginErr:'Invalid username or password.'});
    return;
  }
  const user={...acct,username:u};
  if(acct.role==='superadmin'){
    setState({screen:'superadmin',user,loginErr:'',superLoading:true});
    loadAllSubs();
    if(pollTimer)clearInterval(pollTimer);
    pollTimer=setInterval(loadAllSubs,10000);
  } else {
    setState({screen:'form',user,loginErr:'',formData:initData(),formStatus:'empty',activeSection:1});
    await loadFormState(user);
  }
}

async function loadFormState(user){
  const status=await storageLoad(`status_${user.username}`);
  if(status==='submitted'){
    const sub=await storageLoad(`submission_${user.username}`,true);
    if(sub&&sub.formData)setState({formStatus:'submitted',formData:sub.formData});
    else setState({formStatus:'submitted'});
  } else if(status==='draft'){
    setState({formStatus:'draft'});
  }
}

function doLogout(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  setState({screen:'login',user:null,loginUser:'',loginPass:'',loginErr:'',formData:initData(),formStatus:'empty',activeSection:1,superSubs:[],superSelected:null,toast:null});
}

// ─── FORM ACTIONS ──────────────────────────────────────────────────────────
async function doSaveDraft(){
  if(state.busy)return;
  setState({busy:true});
  const ok=await storageSave(`draft_${state.user.username}`,{formData:state.formData,savedAt:new Date().toISOString()},false);
  if(ok)await storageSave(`status_${state.user.username}`,'draft',false);
  setState({busy:false,formStatus:ok?'draft':state.formStatus});
  showToast(ok?'Draft saved successfully!':'Failed to save draft.', ok?'success':'error');
}

async function doLoadDraft(){
  if(state.busy)return;
  setState({busy:true});
  const d=await storageLoad(`draft_${state.user.username}`,false);
  if(d&&d.formData){
    setState({busy:false,formData:d.formData});
    showToast(`Draft loaded (saved ${new Date(d.savedAt).toLocaleString()}) ✓`);
  } else {
    setState({busy:false});
    showToast('No saved draft found.','error');
  }
}

function openConfirm(msg,cb){setState({confirmOpen:true,confirmMsg:msg,confirmCb:cb});}
function closeConfirm(){setState({confirmOpen:false,confirmMsg:'',confirmCb:null});}
function execConfirm(){const cb=state.confirmCb;closeConfirm();if(cb)cb();}

async function doSubmit(){
  if(state.busy)return;
  setState({busy:true});
  const payload={
    formData:state.formData,
    submittedAt:new Date().toISOString(),
    submittedBy:state.user.username,
    accountLabel:state.user.label,
    classNum:state.user.classNum,
  };
  const ok=await storageSave(`submission_${state.user.username}`,payload,true);
  if(ok)await storageSave(`status_${state.user.username}`,'submitted',false);
  setState({busy:false,formStatus:ok?'submitted':state.formStatus});
  showToast(ok?'Form submitted! Now visible to Super Admin. ✓':'Submission failed. Please try again.', ok?'success':'error');
}

  const sec=SECTIONS.find(s=>s.id===state.activeSection);

  const win=window.open('','_blank');

  let html=`<html><head><title>M&E Form - ${state.user.label}</title>
<style>body{font-family:Arial,sans-serif;padding:24px;color:#111}h1{font-size:18px;margin-bottom:4px}h2{font-size:15px;margin:20px 0 12px;color:#1e3a5f}p{margin:4px 0;font-size:13px}.lbl{color:#555;font-size:12px;margin-top:10px;font-weight:bold}.val{font-size:13px;margin-bottom:6px;padding:4px 0;border-bottom:1px solid #eee}@media print{button{display:none}}</style>
</head><body>
<h1>M&E & Process Observation Form</h1>
<p style="color:#555;font-size:13px">${state.user.label} · Status: ${state.formStatus.toUpperCase()} · Printed: ${new Date().toLocaleString()}</p>`;
  SECTIONS.forEach(s=>{
    html+=`<h2>${s.title}</h2>`;
    s.fields.forEach(f=>{
      const v=fdata[f.k]||'';
      html+=`<div class="lbl">${f.l}</div><div class="val">${v||'—'}</div>`;
    });
  });
  html+=`<br><button onclick="window.print()">Print / Save as PDF</button></body></html>`;
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(),500);

// ─── SUPERADMIN ─────────────────────────────────────────────────────────────
async function loadAllSubs(){
  setState({superLoading:true});
  const results=[];
  for(let i=1;i<=12;i++){
    const key=`me${String(i).padStart(2,'0')}`;
    const sub=await storageLoad(`submission_${key}`,true);
    if(sub&&sub.submittedBy)results.push(sub);
  }
  setState({superSubs:results.sort((a,b)=>a.classNum-b.classNum),superLoading:false,superLastUpdate:new Date()});
}

// ─── RENDER FORM FIELD ──────────────────────────────────────────────────────
function renderField(f,val,ro){
  const base=`width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary);background:${ro?'var(--color-background-secondary)':'var(--color-background-primary)'}`;
  let inp='';
  if(f.t==='rating'){
    const btns=[1,2,3,4,5].map(n=>{
      const sel=val==n;
      return `<button class="rbtn${ro?' rbtn-ro':''}" data-key="${f.k}" data-val="${n}" style="padding:5px 11px;border-radius:20px;border:1.5px solid ${sel?'#2563eb':'var(--color-border-secondary)'};background:${sel?'#2563eb':'var(--color-background-primary)'};color:${sel?'#fff':'var(--color-text-secondary)'};font-size:12px;cursor:${ro?'default':'pointer'};${ro?'pointer-events:none':''}">
        ${n} — ${RLABELS[n]}
      </button>`;
    }).join('');
    inp=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:5px">${btns}</div>`;
  } else if(f.t==='textarea'){
    inp=`<textarea class="ff" data-key="${f.k}" rows="3" style="${base};resize:vertical" ${ro?'readonly':''}>${escHtml(val||'')}</textarea>`;
  } else if(f.t==='select'){
    const opts=(f.opts||[]).map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
    inp=`<select class="ff" data-key="${f.k}" style="${base}" ${ro?'disabled':''}>
      <option value="">— Select —</option>${opts}
    </select>`;
  } else {
    inp=`<input class="ff" type="${f.t}" data-key="${f.k}" value="${escHtml(val||'')}" style="${base}" ${ro?'readonly':''}/>`;
  }
  return `<div style="margin-bottom:14px">
    <label style="display:block;font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px">${f.l}</label>
    ${inp}
  </div>`;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  </div>
  <!-- Tabs -->
  <div style="background:var(--color-background-primary);padding:10px 20px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;flex-wrap:wrap;gap:6px;overflow-x:auto">
    ${tabs}
  </div>
  <!-- Content -->
  <div style="max-width:760px;margin:20px auto;padding:0 16px 100px">
    ${isSubmitted?'<div style="background:#dcfce7;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#15803d;font-weight:500">✅ This form has been submitted and reflected to the Super Admin. This is now read-only.</div>':''}
    <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:24px;border:0.5px solid var(--color-border-tertiary)">
      <h2 style="font-size:16px;font-weight:500;color:#1e3a5f;margin-bottom:20px">${sec.title}</h2>
      ${fields}
      <!-- Navigation -->
      <div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:0.5px solid var(--color-border-tertiary)">
        <button id="btn-prev" ${activeSection===1?'disabled':''} style="padding:8px 18px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:13px;opacity:${activeSection===1?'0.4':'1'}">← Previous</button>
        <span style="font-size:12px;color:var(--color-text-secondary);align-self:center">Section ${activeSection} of 10</span>
        <button id="btn-next" ${activeSection===10?'disabled':''} style="padding:8px 18px;border:none;background:#2563eb;color:#fff;border-radius:6px;font-size:13px;font-weight:500;opacity:${activeSection===10?'0.4':'1'}">Next →</button>
      </div>
    </div>
    <!-- Action buttons -->
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:16px">
      ${actionBtns}
      <button id="btn-print" style="display:flex;align-items:center;gap:6px;padding:10px 20px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500">
        🖨️ Print / Save PDF
      </button>
    </div>
  </div>
</div>`;
}

// ─── RENDER SUPERADMIN ───────────────────────────────────────────────────────
function renderSuperAdmin(){
  const{superSubs,superLoading,superSelected,superSection,superLastUpdate,toast,user}=state;
  const toastHtml=toast?`<div style="position:fixed;bottom:20px;right:20px;z-index:9999;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;background:${toast.type==='error'?'#ef4444':'#10b981'};color:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.2)">${toast.type==='error'?'❌':'✅'} ${toast.msg}</div>`:'';

  if(superSelected){
    const d=superSelected.formData;
    const sec=SECTIONS.find(s=>s.id===superSection);
    const tabs=SECTIONS.map(s=>{
      const active=s.id===superSection;
      return `<button class="sa-tab" data-sid="${s.id}" style="padding:5px 12px;border-radius:20px;border:1.5px solid ${active?'#1e3a5f':'var(--color-border-tertiary)'};background:${active?'#1e3a5f':'var(--color-background-primary)'};color:${active?'#fff':'var(--color-text-secondary)'};font-size:12px;white-space:nowrap">${s.label}</button>`;
    }).join('');
    const fields=sec.fields.map(f=>renderField(f,d[f.k],true)).join('');
    return `
<div style="min-height:500px;background:var(--color-background-tertiary)">${toastHtml}
  <div style="background:#1e3a5f;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:15px;font-weight:500">📋 ${superSelected.accountLabel} — Submission</div>
      <div style="font-size:11px;opacity:0.75">Submitted: ${new Date(superSelected.submittedAt).toLocaleString()} · Read-only</div>
    </div>
    <button id="sa-back" style="padding:7px 14px;background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:6px;font-size:12px;cursor:pointer">← Back to Dashboard</button>
  </div>
  <div style="background:var(--color-background-primary);padding:10px 20px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;flex-wrap:wrap;gap:6px">${tabs}</div>
  <div style="max-width:760px;margin:20px auto;padding:0 16px 40px">
    <div style="background:#fef3c7;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#92400e">🔒 Super Admin View — Read-only. Editing is not allowed on submitted forms.</div>
    <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:24px;border:0.5px solid var(--color-border-tertiary)">
      <h2 style="font-size:16px;font-weight:500;color:#1e3a5f;margin-bottom:20px">${sec.title}</h2>
      ${fields}
      <div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:0.5px solid var(--color-border-tertiary)">
        <button class="sa-nav" data-dir="-1" ${superSection===1?'disabled':''} style="padding:8px 18px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:13px;opacity:${superSection===1?'0.4':'1'}">← Previous</button>
        <span style="font-size:12px;color:var(--color-text-secondary);align-self:center">Section ${superSection} of 10</span>
        <button class="sa-nav" data-dir="1" ${superSection===10?'disabled':''} style="padding:8px 18px;border:none;background:#1e3a5f;color:#fff;border-radius:6px;font-size:13px;opacity:${superSection===10?'0.4':'1'}">Next →</button>
      </div>
    </div>
  </div>
</div>`;
  }

  // Dashboard
  const submitted=superSubs.length;
  const pending=12-submitted;
  const cards=ME_ACCTS.map(acct=>{
    const sub=superSubs.find(s=>s.submittedBy===acct.username);
    return `<div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:18px;border:${sub?'1.5px solid #10b981':'0.5px solid var(--color-border-tertiary)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${acct.label}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">@${acct.username}</div>
        </div>
        <span style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:${sub?'#dcfce7':'#fef3c7'};color:${sub?'#15803d':'#92400e'}">
          ${sub?'✅ Submitted':'⏳ Pending'}
        </span>
      </div>
      ${sub
        ?`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:10px">${new Date(sub.submittedAt).toLocaleString()}</div>
          <button class="view-sub" data-username="${acct.username}" style="width:100%;padding:7px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer">View Submission →</button>`
        :`<div style="font-size:12px;color:var(--color-text-secondary);font-style:italic">No submission yet.</div>`
      }
    </div>`;
  }).join('');

  return `
<div style="min-height:500px;background:var(--color-background-tertiary)">${toastHtml}
  <div style="background:#1e3a5f;color:#fff;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:16px;font-weight:500">🏛️ Super Admin Dashboard</div>
      <div style="font-size:11px;opacity:0.75">M&amp;E Consolidator View · ${superLastUpdate?`Updated ${superLastUpdate.toLocaleTimeString()}`:'Loading...'}</div>
    </div>
    <div style="display:flex;gap:10px">
      <button id="sa-refresh" style="padding:7px 14px;background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:6px;font-size:12px;cursor:pointer">🔄 Refresh</button>
      <button id="sa-logout" style="padding:7px 14px;background:#ef4444;border:none;color:#fff;border-radius:6px;font-size:12px;cursor:pointer">Logout</button>
    </div>
  </div>
  <div style="padding:20px;max-width:1100px;margin:0 auto">
    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
      <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:16px;border-left:4px solid #2563eb;border-top:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">Total Accounts</div>
        <div style="font-size:28px;font-weight:500;color:#2563eb">12</div>
      </div>
      <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:16px;border-left:4px solid #10b981;border-top:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">Submitted</div>
        <div style="font-size:28px;font-weight:500;color:#10b981">${submitted}</div>
      </div>
      <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:16px;border-left:4px solid #f59e0b;border-top:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">Pending</div>
        <div style="font-size:28px;font-weight:500;color:#f59e0b">${pending}</div>
      </div>
    </div>
    <!-- Cards -->
    ${superLoading?'<div style="text-align:center;padding:40px;color:var(--color-text-secondary);font-size:13px">Loading submissions...</div>'
      :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">${cards}</div>`}
  </div>
</div>`;
}

// ─── EVENT BINDING ──────────────────────────────────────────────────────────
function attachEvents(){
  // Login
  const liUser=document.getElementById('li-user');
  const liPass=document.getElementById('li-pass');
  const liBtn=document.getElementById('li-btn');
  if(liUser){
    liUser.addEventListener('input',e=>{ state.loginUser=e.target.value; });
    liUser.addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
  }
  if(liPass){
    liPass.addEventListener('input',e=>{ state.loginPass=e.target.value; });
    liPass.addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
  }
  if(liBtn) liBtn.addEventListener('click',doLogin);

  // Form buttons
  const btnLogout=document.getElementById('btn-logout');
  const btnSave=document.getElementById('btn-save');
  const btnSubmit=document.getElementById('btn-submit');
  const btnLoad=document.getElementById('btn-load');
  const btnPrint=document.getElementById('btn-print');
  const btnPrev=document.getElementById('btn-prev');
  const btnNext=document.getElementById('btn-next');
  const confCancel=document.getElementById('conf-cancel');
  const confOk=document.getElementById('conf-ok');

  if(btnLogout) btnLogout.addEventListener('click',doLogout);
  if(btnSave) btnSave.addEventListener('click',doSaveDraft);
  if(btnSubmit) btnSubmit.addEventListener('click',()=>{
    openConfirm('Are you sure you want to submit this form? You will not be able to edit it after submission. The Super Admin will be able to view your submission.',()=>doSubmit());
  });
  if(btnLoad) btnLoad.addEventListener('click',doLoadDraft);
  if(btnPrint) btnPrint.addEventListener('click',doPrint);
  if(btnPrev) btnPrev.addEventListener('click',()=>{ if(state.activeSection>1)setState({activeSection:state.activeSection-1}); });
  if(btnNext) btnNext.addEventListener('click',()=>{ if(state.activeSection<10)setState({activeSection:state.activeSection+1}); });
  if(confCancel) confCancel.addEventListener('click',closeConfirm);
  if(confOk) confOk.addEventListener('click',execConfirm);

  // Section tabs
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({activeSection:parseInt(btn.dataset.sid)}));
  });

  // Form fields
  document.querySelectorAll('.ff').forEach(el=>{
    el.addEventListener('change',e=>{
      if(state.formStatus==='submitted')return;
      const key=e.target.dataset.key;
      state.formData={...state.formData,[key]:e.target.value};
    });
    el.addEventListener('input',e=>{
      if(state.formStatus==='submitted')return;
      const key=e.target.dataset.key;
      state.formData={...state.formData,[key]:e.target.value};
    });
  });

  // Rating buttons
  document.querySelectorAll('.rbtn:not(.rbtn-ro)').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(state.formStatus==='submitted')return;
      const key=btn.dataset.key;
      const val=btn.dataset.val;
      state.formData={...state.formData,[key]:val};
      render();
    });
  });

  // Superadmin
  const saRefresh=document.getElementById('sa-refresh');
  const saLogout=document.getElementById('sa-logout');
  const saBack=document.getElementById('sa-back');
  if(saRefresh) saRefresh.addEventListener('click',loadAllSubs);
  if(saLogout) saLogout.addEventListener('click',doLogout);
  if(saBack) saBack.addEventListener('click',()=>setState({superSelected:null,superSection:1}));

  document.querySelectorAll('.sa-tab').forEach(btn=>{
    btn.addEventListener('click',()=>setState({superSection:parseInt(btn.dataset.sid)}));
  });

  document.querySelectorAll('.sa-nav').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const dir=parseInt(btn.dataset.dir);
      const ns=state.superSection+dir;
      if(ns>=1&&ns<=10)setState({superSection:ns});
    });
  });

  document.querySelectorAll('.view-sub').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const sub=state.superSubs.find(s=>s.submittedBy===btn.dataset.username);
      if(sub)setState({superSelected:sub,superSection:1});
    });
  });
}

render();
</script>
