<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DepEd NCR — Training of Regional Trainers M&E Portal 2026</title>
<style>
:root{
  --primary:#1a3a5c;--accent:#e8a020;--success:#2e7d32;
  --danger:#c62828;--warn:#f57f17;--bg:#f0f4f8;
  --card:#ffffff;--border:#d0d7de;--text:#1c2a3a;
  --muted:#6b7a8d;--sidebar-w:245px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#1a3a5c 0%,#0d2137 55%,#1a4a2c 100%)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:20px;color:var(--primary);font-weight:800;line-height:1.3}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px}
.login-logo .badge-prog{display:inline-block;background:#e8f5e9;color:#2e7d32;
  padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px}
.login-box label{display:block;font-size:13px;font-weight:600;color:var(--text);
  margin-bottom:6px;margin-top:16px}
.login-box input{width:100%;padding:10px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-size:14px;transition:.2s}
.login-box input:focus{border-color:var(--primary);outline:none}
.btn-login{width:100%;margin-top:24px;padding:12px;background:var(--primary);
  color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;
  cursor:pointer;transition:.2s}
.btn-login:hover{background:#254d78}
#loginError{color:var(--danger);font-size:13px;margin-top:10px;text-align:center;display:none;line-height:1.6}

/* APP */
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--primary);color:#fff;
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.15)}
.sidebar-header h2{font-size:11px;font-weight:700;letter-spacing:.5px;opacity:.6;text-transform:uppercase}
.sidebar-header p{font-size:14px;font-weight:700;margin-top:2px}
.sidebar-user{padding:10px 16px;background:rgba(0,0,0,.2);font-size:12px;
  border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-user .su-name{display:block;font-weight:700;font-size:13px;margin-top:2px}
.sidebar-user .su-role{display:block;font-size:11px;opacity:.7;margin-top:1px}
.nav-section{padding:10px 16px 4px;font-size:10px;font-weight:700;opacity:.5;
  text-transform:uppercase;letter-spacing:.8px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 16px;
  cursor:pointer;font-size:13px;font-weight:500;transition:.15s;
  border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.1);border-left-color:rgba(255,255,255,.4)}
.nav-item.active{background:rgba(255,255,255,.15);border-left-color:var(--accent);font-weight:700}
.logout-btn{margin-top:auto;padding:14px 16px;background:rgba(255,0,0,.15);
  cursor:pointer;font-size:13px;font-weight:600;border-top:1px solid rgba(255,255,255,.1);transition:.15s}
.logout-btn:hover{background:rgba(255,0,0,.3)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px}
.page-title{font-size:21px;font-weight:700;color:var(--primary);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.loading{font-size:13px;color:var(--muted);padding:20px 0}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:14px;margin-bottom:22px}
.kpi-card{background:var(--card);border-radius:10px;padding:16px;
  border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi-val{font-size:26px;font-weight:800;color:var(--primary);margin:4px 0}
.kpi-sub{font-size:11px;color:var(--muted)}
.card{background:var(--card);border-radius:10px;padding:20px;
  border:1px solid var(--border);margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h3{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--primary);color:#fff;padding:9px 10px;text-align:left;font-weight:600}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:#f5f8fc}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-met{background:#e8f5e9;color:#2e7d32}
.badge-below{background:#ffebee;color:#c62828}
.badge-pending{background:#fff8e1;color:#f57f17}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;font-weight:600;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;
  border:1.5px solid var(--border);border-radius:7px;font-size:13px;transition:.2s;
  font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--primary);outline:none}
.form-group input:disabled,.form-group textarea:disabled{
  background:#f0f0f0;color:#888;cursor:not-allowed}
.btn{padding:9px 18px;border:none;border-radius:7px;font-size:13px;
  font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#254d78}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#1b5e20}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.msg{padding:10px 14px;border-radius:7px;font-size:13px;font-weight:600;margin:10px 0}
.msg-success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.msg-error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.msg-info{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}

/* SECTION TABS */
.section-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.s-tab{padding:7px 13px;border-radius:20px;border:2px solid var(--primary);
  background:#fff;color:var(--primary);font-size:12px;font-weight:700;
  cursor:pointer;transition:.2s}
.s-tab.active{background:var(--primary);color:#fff}
.s-tab:hover:not(.active){background:#e8f0f8}

/* RUBRIC / ABCD */
.rubric-section{background:#f8fafc;border:1px solid var(--border);
  border-radius:8px;padding:14px;margin-bottom:14px}
.rubric-label{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px}
.rubric-desc{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6}
.abcd-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.abcd-label{display:flex;align-items:center;gap:5px;padding:6px 14px;
  border:2px solid var(--border);border-radius:20px;cursor:pointer;
  font-size:12px;font-weight:600;transition:.2s;background:#fff}
.abcd-label:hover{border-color:var(--primary);background:#e8f0f8}
.abcd-label input[type="radio"]{accent-color:var(--primary)}
.abcd-selected{border-color:var(--primary);background:#e8f0f8;color:var(--primary)}

/* CHECKLIST */
.checklist-item{padding:7px 0;border-bottom:1px solid #f0f4f8}
.checklist-item:last-child{border-bottom:none}
.check-label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;
  font-size:12.5px;line-height:1.5}
.check-label input[type="checkbox"]{margin-top:2px;flex-shrink:0;
  accent-color:var(--primary);width:15px;height:15px}

/* INCIDENT CARD */
.incident-card{border:1.5px solid var(--border);border-radius:8px;
  padding:14px;margin-bottom:12px;background:#fafcff}

/* SUMMARY */
.summary-category{border:1px solid var(--border);border-radius:8px;
  padding:14px;margin-bottom:12px}
.sum-cat-header{display:flex;justify-content:space-between;
  align-items:center;margin-bottom:10px}
.sum-cat-header strong{font-size:13px;color:var(--primary)}
.overall-rating{display:inline-block;padding:12px 28px;border-radius:12px;
  font-size:36px;font-weight:800}
.rating-scale-box{background:#f8fafc;border:1px solid var(--border);
  border-radius:8px;padding:14px;margin-bottom:14px}

/* RESPONSIVE */
@media(max-width:700px){
  .form-row,.form-row-3{grid-template-columns:1fr}
  .abcd-group{gap:5px}
}
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <h1 style="font-size:17px;line-height:1.4">Training of Regional Trainers<br>on the Revised Grade 6 Curriculum</h1>
      <p style="font-size:13px;font-weight:700;color:var(--primary);margin-top:6px">Department of Education (DepEd)</p>
      <p style="font-size:12px;color:var(--muted);margin-top:1px">National Capital Region (NCR)</p>
      <span class="badge-prog" style="margin-top:8px;display:inline-block">M&amp;E &amp; Process Observation System</span>
    </div>
    <label>Username</label>
    <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">🔐 Login</button>
    <div id="loginError">Invalid username or password.</div>
  </div>
</div>

<!-- ==================== APP ==================== -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>DepEd NCR</h2>
      <p>Regional Trainers M&amp;E 2026</p>
    </div>
    <div class="sidebar-user">
      <span class="su-name" id="sidebarName">—</span>
      <span class="su-role" id="sidebarRole">—</span>
    </div>
    <div id="sidebarNav"></div>
    <div class="logout-btn" onclick="doLogout()">🚪 Logout</div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
// ============================================================
// ⚙️ CONFIG — Replace with your Supabase credentials
// ============================================================
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

// ============================================================
// 🔐 HARDCODED FALLBACK ACCOUNTS
// These work even if Supabase is unreachable or tables are empty.
// Update these to match exactly what you inserted in Supabase.
// ============================================================
const FALLBACK_USERS = [
  {id:'fallback-sa',name:'Super Administrator',username:'superadmin',password:'Admin@2026!',role:'superadmin',class_assigned:null},
  {id:'fallback-1', name:'M&E Officer Class 1', username:'me_class1', password:'Class1@2026', role:'me_officer',class_assigned:'Class 1'},
  {id:'fallback-2', name:'M&E Officer Class 2', username:'me_class2', password:'Class2@2026', role:'me_officer',class_assigned:'Class 2'},
  {id:'fallback-3', name:'M&E Officer Class 3', username:'me_class3', password:'Class3@2026', role:'me_officer',class_assigned:'Class 3'},
  {id:'fallback-4', name:'M&E Officer Class 4', username:'me_class4', password:'Class4@2026', role:'me_officer',class_assigned:'Class 4'},
  {id:'fallback-5', name:'M&E Officer Class 5', username:'me_class5', password:'Class5@2026', role:'me_officer',class_assigned:'Class 5'},
  {id:'fallback-6', name:'M&E Officer Class 6', username:'me_class6', password:'Class6@2026', role:'me_officer',class_assigned:'Class 6'},
  {id:'fallback-7', name:'M&E Officer Class 7', username:'me_class7', password:'Class7@2026', role:'me_officer',class_assigned:'Class 7'},
  {id:'fallback-8', name:'M&E Officer Class 8', username:'me_class8', password:'Class8@2026', role:'me_officer',class_assigned:'Class 8'},
  {id:'fallback-9', name:'M&E Officer Class 9', username:'me_class9', password:'Class9@2026', role:'me_officer',class_assigned:'Class 9'},
  {id:'fallback-10',name:'M&E Officer Class 10',username:'me_class10',password:'Class10@2026',role:'me_officer',class_assigned:'Class 10'},
  {id:'fallback-11',name:'M&E Officer Class 11',username:'me_class11',password:'Class11@2026',role:'me_officer',class_assigned:'Class 11'},
  {id:'fallback-12',name:'M&E Officer Class 12',username:'me_class12',password:'Class12@2026',role:'me_officer',class_assigned:'Class 12'},
];

let currentUser = null;
let currentSection = 'profile';

// ============================================================
// SUPABASE HELPERS
// ============================================================
async function sbGet(table, query=''){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  if(!r.ok) throw new Error(`GET ${table} failed: ${r.status}`);
  return r.json();
}
async function sbPost(table, data, prefer='return=representation'){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json','Prefer':prefer},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(`POST ${table} failed: ${r.status}`);
  return r.json();
}
async function sbPatch(table, query, data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(`PATCH ${table} failed: ${r.status}`);
  return r.json();
}
async function sbDelete(table, query){
  await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
}

// ============================================================
// AUTH
// ============================================================
async function doLogin(){
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.querySelector('.btn-login');
  errEl.style.display = 'none';

  if(!username || !password){
    errEl.textContent = '⚠️ Please enter your username and password.';
    errEl.style.display = 'block'; return;
  }

  btn.textContent = '⏳ Logging in…';
  btn.disabled = true;

  // Step 1: Try hardcoded fallback first (always works)
  const fallback = FALLBACK_USERS.find(u =>
    u.username === username && u.password === password
  );

  // Step 2: If Supabase is configured, also try DB for updated names/passwords
  let dbUser = null;
  const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_KEY !== 'YOUR_SUPABASE_ANON_KEY';

  if(isConfigured){
    try{
      const users = await sbGet('me_users',
        `?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=*`);
      if(users && users.length > 0) dbUser = users[0];
    }catch(e){
      // DB failed — will fall back to hardcoded below
      console.warn('DB login failed, using fallback. Error:', e.message);
    }
  }

  btn.textContent = '🔐 Login';
  btn.disabled = false;

  // Use DB user if found, else fallback, else fail
  const matchedUser = dbUser || fallback;

  if(!matchedUser){
    if(!isConfigured){
      errEl.innerHTML = '⚠️ Supabase not configured yet.<br>Please update SUPABASE_URL and SUPABASE_KEY in the HTML file.';
    } else {
      errEl.textContent = '❌ Invalid username or password.';
    }
    errEl.style.display = 'block'; return;
  }

  // Login success
  currentUser = matchedUser;
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebarName').textContent = currentUser.name;
  document.getElementById('sidebarRole').textContent =
    currentUser.role === 'superadmin'
      ? '⭐ Super Administrator'
      : `📋 M&E Officer — ${currentUser.class_assigned}`;
  buildNav();
  currentUser.role === 'superadmin' ? renderAdminDashboard() : renderMyForm();
}
function doLogout(){
  currentUser=null;
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  window._formData=null;
}

// ============================================================
// NAVIGATION
// ============================================================
function buildNav(){
  const nav=document.getElementById('sidebarNav');
  if(currentUser.role==='superadmin'){
    nav.innerHTML=`
      <div class="nav-section">Admin</div>
      <div class="nav-item active" id="nav_dash" onclick="setNav('nav_dash',renderAdminDashboard)">📊 Dashboard</div>
      <div class="nav-item" id="nav_subs" onclick="setNav('nav_subs',renderAllSubmissions)">📋 All Submissions</div>
      <div class="nav-item" id="nav_users" onclick="setNav('nav_users',renderManageUsers)">👤 Manage Users</div>
      <div class="nav-item" id="nav_help" onclick="setNav('nav_help',renderHelp)">❓ Help</div>`;
  }else{
    nav.innerHTML=`
      <div class="nav-section">M&E Officer</div>
      <div class="nav-item active" id="nav_form" onclick="setNav('nav_form',renderMyForm)">📝 Observation Form</div>
      <div class="nav-item" id="nav_mysubs" onclick="setNav('nav_mysubs',renderMySubmissions)">📋 My Submissions</div>
      <div class="nav-item" id="nav_help" onclick="setNav('nav_help',renderHelp)">❓ Help</div>`;
  }
}
function setNav(id,fn){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  fn();
}

// ============================================================
// FORM DATA STRUCTURE
// ============================================================
function initFormData(){
  window._formData={
    profile:{
      pd_title:'Training of Regional Trainers on the Revised Grade 6 Curriculum',
      class_name:currentUser.class_assigned||'',
      obs_date:new Date().toISOString().split('T')[0],
      me_officer:currentUser.name,
      num_participants:'',class_manager:'',trainers:'',training_day:'Day 1'
    },
    incidents:[],
    participants:{row1_col:'',row2_col:'',target_pax:'',actual_pax:'',
      qualified_pax:'',reason_deviation:'',notes:''},
    design:{col:'',components:{professional_standards:'',learning_objectives:'',
      session_contents:'',time_allotment:'',logical_sequence:'',
      program_methodology:'',session_outputs:'',workplace_application:''}},
    rps:{row1_col:'',row2_col:'',standards:{},standards_notes:'',reason_deviation:''},
    lrms:{row1_col:'',row2_col:'',row3_col:'',notes:''},
    pm:{col:'',checklist:{},notes:''},
    environment:{col:'',checklist:{},notes:''},
    summary:{
      findings:{participants:'',design:'',rps:'',lrms:'',pm:'',eval_scheme:'',environment:''},
      recommendations:{participants:'',design:'',rps:'',lrms:'',pm:'',eval_scheme:'',environment:''}
    }
  };
}

// ============================================================
// SECTION DEFINITIONS
// ============================================================
const SECTIONS=[
  {key:'profile',label:'1. Profile'},
  {key:'incidents',label:'2. Critical Incidents'},
  {key:'participants',label:'3. Participants'},
  {key:'design',label:'4. Program Design'},
  {key:'rps',label:'5. Resource Persons'},
  {key:'lrms',label:'6. LRMs'},
  {key:'pm',label:'7. Prog. Management'},
  {key:'environment',label:'8. Environment'},
  {key:'summary',label:'9. Summary'},
];

const ABCD_OPTS=[
  {val:'A',pts:4},{val:'B',pts:3},{val:'C',pts:2},{val:'D',pts:1}
];

const DESIGN_COMPONENTS=[
  {key:'professional_standards',label:'Professional Standards'},
  {key:'learning_objectives',label:'Learning Objectives'},
  {key:'session_contents',label:'Session Contents'},
  {key:'time_allotment',label:'Time Allotment'},
  {key:'logical_sequence',label:'Logical Sequence'},
  {key:'program_methodology',label:'Program Methodology'},
  {key:'session_outputs',label:'Session Outputs'},
  {key:'workplace_application',label:'Workplace Application'},
];

const RP_STANDARDS=[
  '1. Session objectives are explained at the beginning of the session.',
  '2. Resource speakers use recognized best learning practices (motivational/mood-setting activities, etc.).',
  '3. Sessions are delivered based on the quality assured PD program design to ensure objectives are met.',
  '4. Appropriate and timely adjustments to content, methodology, and schedule address emerging needs.',
  '5. Participants are recognized as active learners and engaged in meaningful discussions and activities.',
  '6a. Deliver accurate content.',
  '6b. Transition topics in a logical manner.',
  '6c. Present concepts with clarity and congruence to session objectives and type of participants.',
  '7a. Deliver sessions consistent with the time allotted.',
  '7b. Inform participants of the time required for every activity or assessment.',
  '8a. Encourage participants to be actively engaged in the session.',
  '8b. Apply clean and appropriate humor in keeping the session lively.',
  '8c. Observe GEDSI in engaging with participants.',
  '8d. Sense and address needs, potentials, strengths, and weaknesses of participants.',
  '8e. Monitor the energy level of participants during sessions.',
  '8f. Make learning relevant by using real-life examples and activities.',
  '8g. Utilize a combination of different and engaging methods/activities appropriately.',
  '8h. Give clear instructions in employing various strategies.',
  '9a. Ask questions that are clear and focused.',
  '9b. Ask follow-up questions to clarify participants\' responses.',
  '9c. Paraphrase questions for clarity.',
  '9d. Ask higher-order thinking skills questions to elicit participants\' ideas.',
  '9e. Respond in a fair and timely manner to participants\' questions and answers.',
  '9f. Listen to participants\' ideas or responses.',
  '9g. Paraphrase participants\' ideas to confirm what has been said.',
  '9h. Conduct formative assessments to check understanding of participants.',
  '10. Establish and maintain a positive/non-threatening and comfortable learning environment.',
  '11a. Use clear and appropriate language for learners.',
  '11b. Express ideas with clarity, logic, and correct grammar.',
  '11c. Use non-verbal communication to reinforce the verbal message.',
  '11d. Use a well-modulated voice in facilitating the session.',

async function renderMyForm(){
  const mc=document.getElementById('mainContent');
  if(!window._formData) initFormData();
  mc.innerHTML=`
    <div class="page-title">📝 Onsite M&amp;E &amp; Process Observation Form</div>
    <div class="page-sub">${currentUser.class_assigned} — Fill in all 9 sections then submit.</div>
    <div id="formMsg" style="display:none"></div>
    <div class="section-tabs" id="sectionTabs">
      ${SECTIONS.map(s=>`<button class="s-tab${s.key===currentSection?' active':''}"
        onclick="switchSection('${s.key}')">${s.label}</button>`).join('')}
    </div>
    <div id="sectionBody"></div>
    <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-primary" onclick="saveDraft()">💾 Save Draft</button>
      <button class="btn btn-success" onclick="submitForm()">📤 Submit Observation</button>
      <button class="btn" style="background:#607d8b;color:#fff" onclick="loadDraft()">🔄 Load Draft</button>
    </div>`;
  renderSection(currentSection);
}

window.switchSection=function(key){
  collectCurrentSection();
  currentSection=key;
  document.querySelectorAll('.s-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.s-tab').forEach(t=>{
    if(t.textContent.includes(SECTIONS.find(s=>s.key===key)?.label.split('.')[0].trim()))
      t.classList.add('active');
  });
  // simpler approach: match by onclick attribute pattern
  document.querySelectorAll('.s-tab').forEach(t=>{
    if(t.getAttribute('onclick')===`switchSection('${key}')`) t.classList.add('active');
  });
  renderSection(key);
};

function renderSection(key){
  const body=document.getElementById('sectionBody');
  if(!body) return;
  const map={
    profile:renderProfile,incidents:renderIncidents,
    participants:renderParticipants,design:renderDesign,
    rps:renderRPs,lrms:renderLRMs,pm:renderPM,
    environment:renderEnvironment,summary:renderSummary
  };
  body.innerHTML=(map[key]||renderProfile)();
}

// ---- COLLECT ALL ----
function collectCurrentSection(){
  const map={profile:collectProfile,incidents:collectIncidents,
    participants:collectParticipants,design:collectDesign,
    rps:collectRPs,lrms:collectLRMs,pm:collectPM,
    environment:collectEnvironment,summary:collectSummary};
  (map[currentSection]||function(){})();
}
function collectAll(){
  collectProfile();collectIncidents();collectParticipants();
  collectDesign();collectRPs();collectLRMs();collectPM();
  collectEnvironment();collectSummary();
}

// ---- RATINGS COMPUTATION ----
function colPts(c){return c==='A'?4:c==='B'?3:c==='C'?2:c==='D'?1:null;}
function avg(...vals){const v=vals.filter(x=>x!==null&&x!==undefined);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function computeSectionRatings(){
  const fd=window._formData;
  const p1=colPts(fd.participants.row1_col),p2=colPts(fd.participants.row2_col);
  const rp1=colPts(fd.rps.row1_col),rp2=colPts(fd.rps.row2_col);
  const l1=colPts(fd.lrms.row1_col),l2=colPts(fd.lrms.row2_col),l3=colPts(fd.lrms.row3_col);
  return{
    partRating:avg(p1,p2),
    designRating:colPts(fd.design.col),
    rpsRating:avg(rp1,rp2),
    lrmsRating:avg(l1,l2,l3),
    pmRating:colPts(fd.pm.col),
    envRating:colPts(fd.environment.col),
  };
}
function ratingLabel(r){
  if(!r)return'—';
  if(r>=3.6)return`${r.toFixed(2)} — Exceeded Expectations`;
  if(r>=2.6)return`${r.toFixed(2)} — Fully Met Expectations`;
  if(r>=1.6)return`${r.toFixed(2)} — Partially Met`;
  return`${r.toFixed(2)} — Minimal Conformance`;
}
function ratingClass(r){
  if(!r)return'badge-pending';
  if(r>=2.6)return'badge-met';
  if(r>=1.6)return'badge-pending';
  return'badge-below';
}

async function saveDraft(){
  collectAll();
  const msg=showMsg('formMsg','','info');
  try{
    const payload=buildPayload('draft');
    await upsertObservation(payload);
    showMsg('formMsg','✅ Draft saved successfully!','success');
  }catch(e){showMsg('formMsg','❌ Save error: '+e.message,'error');}
}
async function submitForm(){
  collectAll();
  const p=window._formData.profile;
  if(!p.obs_date||!p.class_manager||!p.trainers){
    showMsg('formMsg','⚠️ Please complete Date, Class Manager, and Trainers in the Profile section before submitting.','error');
    return;
  }
  if(!confirm('Submit this observation? Once submitted, it will be locked.')) return;
  try{
    const payload=buildPayload('submitted');
    payload.submitted_at=new Date().toISOString();
    await upsertObservation(payload);
    showMsg('formMsg','✅ Observation submitted successfully! Thank you.','success');
    initFormData();
  }catch(e){showMsg('formMsg','❌ Submit error: '+e.message,'error');}
}
async function loadDraft(){
  try{
    const day=window._formData?.profile?.training_day||'Day 1';
    const rows=await sbGet('me_observations',
      `?username=eq.${encodeURIComponent(currentUser.username)}&training_day=eq.${encodeURIComponent(day)}&order=updated_at.desc&limit=1`);
    if(!rows||rows.length===0){
      showMsg('formMsg',`ℹ️ No saved data found for ${day}.`,'info');return;
    }
    window._formData=rows[0].data;
    renderSection(currentSection);
    showMsg('formMsg',`✅ Loaded ${rows[0].status} — ${rows[0].obs_date}`,'success');
  }catch(e){showMsg('formMsg','❌ Load error: '+e.message,'error');}
}
function buildPayload(status){
  return{
    user_id:currentUser.id,username:currentUser.username,
    class_name:currentUser.class_assigned,
    training_day:window._formData.profile.training_day,
    obs_date:window._formData.profile.obs_date,
    status,data:window._formData,updated_at:new Date().toISOString()
  };
}
async function upsertObservation(payload){
  const existing=await sbGet('me_observations',
    `?username=eq.${encodeURIComponent(currentUser.username)}&training_day=eq.${encodeURIComponent(payload.training_day)}&order=updated_at.desc&limit=1`);
  if(existing&&existing.length>0){
    await sbPatch('me_observations',`?id=eq.${existing[0].id}`,payload);
  }else{
    payload.created_at=new Date().toISOString();
    await sbPost('me_observations',payload,'return=minimal');
  }
}

  <table><tr><th>Rating</th><th>Description</th><th>Points (A/B/C/D)</th></tr>
    <tr><td>3.6 – 4.0</td><td>Exceeded Expectations</td><td>A = 4 pts</td></tr>
    <tr><td>2.6 – 3.5</td><td>Fully Met Expectations</td><td>B = 3 pts</td></tr>
    <tr><td>1.6 – 2.4</td><td>Partially Met</td><td>C = 2 pts</td></tr>
    <tr><td>1.0 – 1.5</td><td>Minimal Conformance</td><td>D = 1 pt</td></tr>
  </table></div>`;
}

// ============================================================
// UTILITIES
// ============================================================
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function val(id){const el=document.getElementById(id);return el?el.value:'';}
function radioVal(name){const el=document.querySelector(`input[name="${name}"]:checked`);return el?el.value:'';}
function abcdRadio(name,selected){
  return ABCD_OPTS.map(o=>`<label class="abcd-label${selected===o.val?' abcd-selected':''}">
    <input type="radio" name="${name}" value="${o.val}"${selected===o.val?' checked':''} onchange="syncAbcdStyle(this)">
    ${o.val} (${o.pts} pts)
  </label>`).join('');
}
window.syncAbcdStyle=function(el){
  document.querySelectorAll(`input[name="${el.name}"]`).forEach(r=>{
    r.parentElement.classList.toggle('abcd-selected',r.checked);
  });
};
window.updateBadge=function(prefix,badgeId,total){
  let count=0;
  for(let i=0;i<total;i++){const cb=document.getElementById(`${prefix}_${i}`);if(cb&&cb.checked)count++;}
  const badge=document.getElementById(badgeId);
  if(!badge)return;
  const pct=Math.round(count/total*100);
  badge.textContent=`${count}/${total} (${pct}%)`;
  badge.className=`badge ${pct>=91?'badge-met':pct>=51?'badge-pending':'badge-below'}`;
};
function showMsg(id,text,type){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=text;
  el.className=`msg msg-${type}`;
  el.style.display='block';
  if(type==='success')setTimeout(()=>el.style.display='none',5000);
}
function showMsgEl(id,text,type){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML=`<div class="msg msg-${type}" style="display:block">${text}</div>`;
}

// ============================================================
// INIT
// ============================================================
document.getElementById('loginPass').addEventListener('keydown',e=>{
  if(e.key==='Enter') doLogin();
});
</script>
